spring.application.name=guias
server.port=8080

# =====================
# H2 IN-MEMORY DATABASE
# =====================
spring.datasource.url=jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =====================
# H2 CONSOLE
# =====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================
# AWS S3 CONFIGURATION
# =====================
app.s3.bucket=${AWS_S3_ENROLLMENTS_BUCKET:min-bucket-local}
app.s3.region=${AWS_REGION:us-east-1}
logging.level.software.amazon.awssdk=DEBUG
logging.level.software.amazon.awssdk.request=DEBUG

# =====================
# RABBITMQ CONFIGURATION
# =====================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest